<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Photo File Upload</title>
    <style>
        body { font-family: sans-serif; margin: 50px; line-height: 1.6; }
        .container { max-width: 400px; border: 1px solid #ccc; padding: 20px; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Upload a File</h2>
        <form action="/upload" method="post" enctype="multipart/form-data">
            <input type="file" name="file_to_upload" required>
            <br><br>
            <button type="submit">Upload to Backend</button>
        </form>
    </div>
</body>
</html>
